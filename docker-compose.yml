version: '3.9'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./furniture.db:/app/furniture.db
      - ./divany.csv:/app/divany.csv
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    command: sh -c "npm install && npm start"
    depends_on:
      - backend
    restart: unless-stopped
